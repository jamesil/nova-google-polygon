name: Check & fix styling

on: [ push ]

permissions:
  contents: write

jobs:
  styling:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install packages
        run: npm ci

      - name: Prettier
        run: npm run format

      - name: Lint
        run: npm run lint

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Configure Composer auth for Nova
        run: composer config "http-basic.nova.laravel.com" "${{ secrets.NOVA_USERNAME }}" "${{ secrets.NOVA_PASSWORD }}"

      - name: Install composer dependencies
        run: composer install --no-interaction --no-progress

      - name: Run PHP CS Fixer
        run: composer format

      - name: Detect formatting changes
        id: formatting_changes
        run: |
          if ! git diff --quiet; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit changes
        if: steps.formatting_changes.outputs.has_changes == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: ${{ github.ref_name }}
          commit_message: "style: reformat"
